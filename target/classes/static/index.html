<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Access Control - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div class="glass-panel auth-box" id="loginForm">
            <div class="auth-header">
                <h1>Dual Access Control</h1>
                <p>Secure Enterprise File Storage</p>
            </div>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" class="form-control" placeholder="admin" required value="admin">
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required value="admin123" style="padding-right: 40px;">
                    <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 40px; cursor: pointer; color: var(--text-muted);" id="toggleLoginPassword"></i>
                </div>
                <button type="submit" class="btn btn-primary mt-3" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>
            <div class="text-center mt-4">
                <p style="color: var(--text-muted); font-size: 0.875rem;">
                    Don't have an account? <a href="#" id="showRegister">Register</a>
                </p>
            </div>
        </div>

        <!-- Registration Form (Hidden by default) -->
        <div class="glass-panel auth-box hidden" id="registerForm">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join the secure platform</p>
            </div>
            <form id="registerFormElement">
                <div class="form-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" class="form-control" placeholder="johndoe" required>
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required style="padding-right: 40px;">
                    <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 40px; cursor: pointer; color: var(--text-muted);" id="toggleRegPassword"></i>
                </div>
                <button type="submit" class="btn btn-primary mt-3" id="registerBtn">
                    <span>Create Account</span>
                </button>
            </form>
            <div class="text-center mt-4">
                <p style="color: var(--text-muted); font-size: 0.875rem;">
                    Already have an account? <a href="#" id="showLogin">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
</body>
</html>
