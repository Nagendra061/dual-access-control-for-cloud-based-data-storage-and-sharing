# Server Configuration
server.port=8080

# Application Name
spring.application.name=Dual Access Control System

# H2 Database Configuration (for development)
spring.datasource.url=jdbc:h2:file:./storage/dacdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MySQL Configuration (for production - uncomment to use)
#spring.datasource.url=jdbc:mysql://localhost:3306/dual_access_control_db
#spring.datasource.username=root
#spring.datasource.password=yourpassword
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=86400000

# File Storage Configuration
file.storage.location=./storage/files
file.temp.location=./storage/temp

# Logging
logging.level.root=INFO
logging.level.com.project.dualaccesscontrol=DEBUG
logging.level.org.springframework.security=DEBUG
